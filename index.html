<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash-Flow Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js for the pie chart (Phase 2) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

  <div class="container">
    <h1>Cash-Flow Dashboard</h1>
    <p class="subtitle">Track your salary, expenses and balance</p>

    <!-- error message box, hidden by default -->
    <div id="errorBox" class="error-box hidden"></div>

    <!-- SALARY SECTION -->
    <div class="card">
      <h2>Salary</h2>
      <form id="salaryForm">
        <input type="number" id="salaryInput" placeholder="Enter Total Salary" min="0" required>
        <button type="submit">Set Salary</button>
      </form>
      <p>Total Salary: <span id="salaryDisplay">0</span></p>
    </div>

    <!-- EXPENSE SECTION -->
    <div class="card">
      <h2>Add Expense</h2>
      <form id="expenseForm">
        <input type="text" id="expenseName" placeholder="Expense Name" required>
        <input type="number" id="expenseAmount" placeholder="Amount" min="0" required>
        <button type="submit">Add Expense</button>
      </form>

      <ul id="expenseList"></ul>
    </div>

    <!-- BALANCE SECTION -->
    <div class="card">
      <h2>Remaining Balance</h2>
      <p id="balanceDisplay" class="balance">0</p>
    </div>

    <!-- CHART SECTION -->
    <div class="card chart-card">
      <h2>Balance vs Expenses</h2>
      <canvas id="cashflowChart" width="300" height="300"></canvas>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
